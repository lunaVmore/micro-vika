<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Micro-Vika — актриса дубляжа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #1a1a2e;
        }

        /* Главное меню */
        .menu {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.5s ease;
        }

        .menu.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 3rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            animation: glowPulse 3s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
            50% { text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 60px rgba(255, 200, 100, 0.4); }
        }

        .characters-grid {
            display: flex;
            gap: 3rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 2rem;
        }

        .character-card {
            cursor: pointer;
            transition: transform 0.3s ease;
            text-align: center;
            width: 200px;
        }

        .character-card:hover {
            transform: scale(1.1);
        }

        .character-preview {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .character-card:hover .character-preview {
            border-color: gold;
            box-shadow: 0 0 30px gold;
        }

        .character-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .character-card h3 {
            font-size: 1.5rem;
            margin: 0;
            color: white;
        }

        /* Сцена */
        .scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
            opacity: 0;
            pointer-events: none;
        }

        .scene.active {
            opacity: 1;
            pointer-events: all;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: gold;
        }

        .nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 2rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .nav-button:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: gold;
            transform: translateY(-50%) scale(1.1);
        }

        .nav-button.prev {
            left: 20px;
        }

        .nav-button.next {
            right: 20px;
        }

        .character-wrapper {
            position: absolute;
            bottom: 100px;
            height: 70vh;
            transition: all 0.5s ease;
        }

        .character-wrapper.left {
            left: 10%;
        }

        .character-wrapper.center {
            left: 50%;
            transform: translateX(-50%);
        }

        .character-wrapper.right {
            right: 10%;
        }

        .character-image {
            height: 100%;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5));
        }

        .sun {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffdd00, #ff9900);
            border-radius: 50%;
            cursor: grab;
            box-shadow: 0 0 50px #ffaa00;
            z-index: 200;
            transition: box-shadow 0.3s ease;
        }

        .sun:active {
            cursor: grabbing;
        }

        .sun::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 221, 0, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
        }

        .character-name {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 30px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            z-index: 50;
        }

        @media (max-width: 768px) {
            .nav-button {
                display: none;
            }
            .character-wrapper {
                height: 50vh;
                bottom: 150px;
            }
            .character-name {
                font-size: 1.5rem;
                bottom: 80px;
            }
            .sun {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- Главное меню -->
    <div class="menu" id="menu">
        <h1 class="logo">Micro-Vika</h1>
        <div class="characters-grid" id="charactersGrid"></div>
    </div>

    <!-- Сцена -->
    <div class="scene" id="scene">
        <button class="back-button" id="backButton">← Назад</button>
        <button class="nav-button prev" id="prevButton">←</button>
        <button class="nav-button next" id="nextButton">→</button>
        
        <div class="character-wrapper center" id="characterWrapper">
            <img class="character-image" id="characterImage" src="" alt="">
        </div>
        
        <div class="sun" id="sun"></div>
        <div class="character-name" id="characterName"></div>
    </div>

    <audio id="audioPlayer" loop></audio>

    <script>
        // Данные персонажей
        const characters = [
            {
                id: 'dog',
                name: 'Пёсик',
                image: 'public/images/characters/dog.png',
                background: 'public/images/backgrounds/forest.png',
                audio: 'public/audio/dog_forest_01.mp3',
                position: 'center'
            },
            {
                id: 'girl',
                name: 'Девочка',
                image: 'public/images/characters/girl.png',
                background: 'public/images/backgrounds/garden.png',
                audio: 'public/audio/girl_garden_01.mp3',
                position: 'center'
            },
            {
                id: 'sorceress',
                name: 'Колдунья',
                image: 'public/images/characters/sorceress.png',
                background: 'public/images/backgrounds/magic_garden.png',
                audio: 'public/audio/sorceress_magicgarden_01.mp3',
                position: 'center'
            }
        ];

        let currentCharIndex = 0;
        let isDragging = false;
        let audio = document.getElementById('audioPlayer');
        let sun = document.getElementById('sun');
        let scene = document.getElementById('scene');
        let menu = document.getElementById('menu');
        let characterImage = document.getElementById('characterImage');
        let characterName = document.getElementById('characterName');
        let characterWrapper = document.getElementById('characterWrapper');

        // Границы солнца
        const sunBounds = {
            minX: 50,
            maxX: window.innerWidth - 130,
            y: window.innerHeight - 150
        };

        // Отрисовка главного меню
        function renderMenu() {
            const grid = document.getElementById('charactersGrid');
            grid.innerHTML = '';
            characters.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.onclick = () => selectCharacter(index);
                card.innerHTML = `
                    <div class="character-preview">
                        <img src="${char.image}" alt="${char.name}" onerror="this.src='https://via.placeholder.com/200'">
                    </div>
                    <h3>${char.name}</h3>
                `;
                grid.appendChild(card);
            });
        }

        // Выбор персонажа
        function selectCharacter(index) {
            currentCharIndex = index;
            updateScene();
            menu.classList.add('hidden');
            scene.classList.add('active');
            audio.play();
        }

        // Обновление сцены
        function updateScene() {
            const char = characters[currentCharIndex];
            scene.style.backgroundImage = `url('${char.background}')`;
            characterImage.src = char.image;
            characterName.textContent = char.name;
            
            // Позиция персонажа
            characterWrapper.className = `character-wrapper ${char.position}`;
            
            // Аудио
            audio.src = char.audio;
            audio.load();
            
            // Сброс солнца
            sun.style.left = sunBounds.minX + 'px';
            sun.style.top = sunBounds.y + 'px';
        }

        // Навигация
        document.getElementById('prevButton').onclick = () => {
            currentCharIndex = (currentCharIndex - 1 + characters.length) % characters.length;
            updateScene();
            audio.play();
        };

        document.getElementById('nextButton').onclick = () => {
            currentCharIndex = (currentCharIndex + 1) % characters.length;
            updateScene();
            audio.play();
        };

        document.getElementById('backButton').onclick = () => {
            scene.classList.remove('active');
            menu.classList.remove('hidden');
            audio.pause();
        };

        // Солнце (перетаскивание)
        let isSunDragging = false;
        let startX, startLeft;

        sun.addEventListener('mousedown', (e) => {
            isSunDragging = true;
            startX = e.clientX;
            startLeft = parseInt(sun.style.left) || sunBounds.minX;
            sun.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isSunDragging) return;
            
            let dx = e.clientX - startX;
            let newLeft = startLeft + dx;
            
            // Ограничения
            newLeft = Math.max(sunBounds.minX, Math.min(sunBounds.maxX, newLeft));
            
            sun.style.left = newLeft + 'px';
            
            // Перемотка аудио
            if (audio.duration) {
                const progress = (newLeft - sunBounds.minX) / (sunBounds.maxX - sunBounds.minX);
                audio.currentTime = progress * audio.duration;
            }
        });

        window.addEventListener('mouseup', () => {
            isSunDragging = false;
            sun.style.cursor = 'grab';
        });

        // Свайп для мобильных
        let touchStartX = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        window.addEventListener('touchend', (e) => {
            if (!scene.classList.contains('active')) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;
            
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    currentCharIndex = (currentCharIndex - 1 + characters.length) % characters.length;
                } else {
                    currentCharIndex = (currentCharIndex + 1) % characters.length;
                }
                updateScene();
                audio.play();
            }
        });

        // Инициализация
        renderMenu();
        sun.style.left = sunBounds.minX + 'px';
        sun.style.top = sunBounds.y + 'px';

        // Обработка ошибок загрузки изображений
        window.onerror = function(msg, url, line) {
            console.log("Ошибка: " + msg + " в " + url + ":" + line);
        };
    </script>
</body>
</html>
