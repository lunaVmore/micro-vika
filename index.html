<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Micro-Vika — актриса дубляжа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #1a1a2e;
        }

        /* Хедер */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            z-index: 1000;
            pointer-events: none;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1);
            border-color: gold;
            box-shadow: 0 0 30px gold;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Главное меню */
        .menu {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.5s ease;
            padding-top: 80px;
        }

        .menu.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .title {
            font-size: 4rem;
            margin-bottom: 3rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            animation: glowPulse 3s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
            50% { text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 60px rgba(255, 200, 100, 0.4); }
        }

        .characters-grid {
            display: flex;
            gap: 3rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 2rem;
        }

        .character-card {
            cursor: pointer;
            transition: transform 0.3s ease;
            text-align: center;
            width: 200px;
        }

        .character-card:hover {
            transform: scale(1.1);
        }

        .character-preview {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .character-card:hover .character-preview {
            border-color: gold;
            box-shadow: 0 0 30px gold;
        }

        .character-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .character-card h3 {
            font-size: 1.5rem;
            margin: 0;
            color: white;
        }

        /* Сцена */
        .scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
            opacity: 0;
            pointer-events: none;
        }

        .scene.active {
            opacity: 1;
            pointer-events: all;
        }

        .back-button {
            position: absolute;
            top: 100px;
            left: 40px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: gold;
        }

        .nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 2rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .nav-button:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: gold;
            transform: translateY(-50%) scale(1.1);
        }

        .nav-button.prev {
            left: 20px;
        }

        .nav-button.next {
            right: 20px;
        }

        /* Персонаж */
        .character-wrapper {
            position: absolute;
            bottom: 100px;
            height: 70vh;
            transition: all 0.5s ease;
        }

        .character-wrapper.left {
            left: 10%;
        }

        .character-wrapper.center {
            left: 50%;
            transform: translateX(-50%);
        }

        .character-wrapper.right {
            right: 10%;
        }

        .character-image {
            height: 100%;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5));
        }

        /* Солнце */
        .sun {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffdd00, #ff9900);
            border-radius: 50%;
            cursor: grab;
            box-shadow: 0 0 50px #ffaa00;
            z-index: 200;
            transition: box-shadow 0.3s ease;
        }

        .sun:active {
            cursor: grabbing;
        }

        .sun::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 221, 0, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 3s infinite;
        }

        /* Игровой бабл (диалоговое окно) */
        .game-bubble {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 20px 20px 20px 5px;
            padding: 15px 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            min-width: 280px;
            z-index: 300;
            transition: all 0.3s ease;
        }

        .game-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid rgba(0, 0, 0, 0.85);
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        .game-bubble.left::after {
            left: 30px;
        }

        .game-bubble.right::after {
            left: auto;
            right: 30px;
        }

        .game-bubble.center::after {
            left: 50%;
            transform: translateX(-50%);
        }

        .bubble-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .bubble-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: gold;
        }

        .bubble-name {
            font-weight: bold;
            color: gold;
            letter-spacing: 0.5px;
        }

        .bubble-time {
            margin-left: auto;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .play-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: gold;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: black;
            transition: all 0.2s ease;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .play-button:hover {
            transform: scale(1.1);
            background: #ffd700;
            box-shadow: 0 0 25px gold;
        }

        .waveform {
            flex: 1;
            height: 40px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .waveform-bar {
            width: 4px;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            transition: all 0.1s ease;
        }

        .waveform-bar.active {
            background: gold;
            height: 100%;
        }

        .waveform-bar:nth-child(1) { height: 30%; }
        .waveform-bar:nth-child(2) { height: 50%; }
        .waveform-bar:nth-child(3) { height: 80%; }
        .waveform-bar:nth-child(4) { height: 60%; }
        .waveform-bar:nth-child(5) { height: 40%; }
        .waveform-bar:nth-child(6) { height: 70%; }
        .waveform-bar:nth-child(7) { height: 90%; }
        .waveform-bar:nth-child(8) { height: 45%; }
        .waveform-bar:nth-child(9) { height: 65%; }
        .waveform-bar:nth-child(10) { height: 35%; }
        .waveform-bar:nth-child(11) { height: 55%; }
        .waveform-bar:nth-child(12) { height: 75%; }

        .bubble-footer {
            margin-top: 8px;
            font-size: 0.75rem;
            opacity: 0.5;
            text-align: right;
            font-style: italic;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
        }

        @media (max-width: 768px) {
            .nav-button {
                display: none;
            }
            .character-wrapper {
                height: 50vh;
                bottom: 150px;
            }
            .sun {
                width: 60px;
                height: 60px;
            }
            .header {
                padding: 15px 20px;
            }
            .back-button {
                top: 90px;
                left: 20px;
            }
            .game-bubble {
                min-width: 240px;
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Хедер с логотипом -->
    <div class="header">
        <div class="logo" id="logo">
            <img src="logo.png" alt="Micro-Vika" onerror="this.src='https://via.placeholder.com/60?text=MV'">
        </div>
    </div>

    <!-- Главное меню -->
    <div class="menu" id="menu">
        <h1 class="title">Micro-Vika</h1>
        <div class="characters-grid" id="charactersGrid"></div>
    </div>

    <!-- Сцена -->
    <div class="scene" id="scene">
        <button class="back-button" id="backButton">← Назад</button>
        <button class="nav-button prev" id="prevButton">←</button>
        <button class="nav-button next" id="nextButton">→</button>
        
        <div class="character-wrapper center" id="characterWrapper">
            <img class="character-image" id="characterImage" src="" alt="">
            
            <!-- Игровой бабл (диалоговое окно) -->
            <div class="game-bubble center" id="gameBubble">
                <div class="bubble-header">
                    <div class="bubble-avatar"></div>
                    <span class="bubble-name" id="bubbleName">Пёсик</span>
                    <span class="bubble-time" id="bubbleTime">0:00 / 0:00</span>
                </div>
                <div class="voice-message">
                    <button class="play-button" id="playButton">▶</button>
                    <div class="waveform" id="waveform">
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                        <div class="waveform-bar"></div>
                    </div>
                </div>
                <div class="bubble-footer">голосовое сообщение</div>
            </div>
        </div>
        
        <div class="sun" id="sun"></div>
    </div>

    <audio id="audioPlayer" loop></audio>

    <script>
        // Данные персонажей
        const characters = [
            {
                id: 'dog',
                name: 'Пёсик',
                image: 'public/images/characters/dog.png',
                background: 'public/images/backgrounds/forest.png',
                audio: 'public/audio/dog_forest_01.mp3',
                position: 'center',
                bubbleOffset: { x: 0, y: -50 } // для точной настройки позже
            },
            {
                id: 'girl',
                name: 'Девочка',
                image: 'public/images/characters/girl.png',
                background: 'public/images/backgrounds/garden.png',
                audio: 'public/audio/girl_garden_01.mp3',
                position: 'center',
                bubbleOffset: { x: 0, y: -50 }
            },
            {
                id: 'sorceress',
                name: 'Колдунья',
                image: 'public/images/characters/sorceress.png',
                background: 'public/images/backgrounds/magic_garden.png',
                audio: 'public/audio/sorceress_magicgarden_01.mp3',
                position: 'center',
                bubbleOffset: { x: 0, y: -50 }
            }
        ];

        let currentCharIndex = 0;
        let isDragging = false;
        let isPlaying = false;
        let audio = document.getElementById('audioPlayer');
        let sun = document.getElementById('sun');
        let scene = document.getElementById('scene');
        let menu = document.getElementById('menu');
        let characterImage = document.getElementById('characterImage');
        let characterWrapper = document.getElementById('characterWrapper');
        let gameBubble = document.getElementById('gameBubble');
        let bubbleName = document.getElementById('bubbleName');
        let bubbleTime = document.getElementById('bubbleTime');
        let playButton = document.getElementById('playButton');
        let waveformBars = document.querySelectorAll('.waveform-bar');

        // Границы солнца
        const sunBounds = {
            minX: 50,
            maxX: window.innerWidth - 130,
            y: window.innerHeight - 150
        };

        // Отрисовка главного меню
        function renderMenu() {
            const grid = document.getElementById('charactersGrid');
            grid.innerHTML = '';
            characters.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.onclick = () => selectCharacter(index);
                card.innerHTML = `
                    <div class="character-preview">
                        <img src="${char.image}" alt="${char.name}" onerror="this.src='https://via.placeholder.com/200'">
                    </div>
                    <h3>${char.name}</h3>
                `;
                grid.appendChild(card);
            });
        }

        // Выбор персонажа
        function selectCharacter(index) {
            currentCharIndex = index;
            updateScene();
            menu.classList.add('hidden');
            scene.classList.add('active');
            audio.play();
            isPlaying = true;
            playButton.textContent = '⏸';
        }

        // Обновление сцены
        function updateScene() {
            const char = characters[currentCharIndex];
            scene.style.backgroundImage = `url('${char.background}')`;
            characterImage.src = char.image;
            bubbleName.textContent = char.name;
            
            // Позиция персонажа и бабла
            characterWrapper.className = `character-wrapper ${char.position}`;
            gameBubble.className = `game-bubble ${char.position}`;
            
            // Применяем смещение, если нужно
            if (char.bubbleOffset) {
                gameBubble.style.transform = `translate(${char.bubbleOffset.x}px, ${char.bubbleOffset.y}px)`;
            }
            
            // Аудио
            audio.src = char.audio;
            audio.load();
            
            // Сброс солнца
            sun.style.left = sunBounds.minX + 'px';
            sun.style.top = sunBounds.y + 'px';
            
            // Сброс плеера
            updateWaveform(0);
            updateTimeDisplay();
        }

        // Обновление времени
        function updateTimeDisplay() {
            const current = formatTime(audio.currentTime);
            const total = formatTime(audio.duration || 0);
            bubbleTime.textContent = `${current} / ${total}`;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Обновление волн
        function updateWaveform(progress) {
            const activeBars = Math.floor(progress * waveformBars.length);
            waveformBars.forEach((bar, index) => {
                if (index < activeBars) {
                    bar.style.background = 'gold';
                } else {
                    bar.style.background = 'rgba(255, 255, 255, 0.3)';
                }
            });
        }

        // Навигация
        document.getElementById('prevButton').onclick = () => {
            currentCharIndex = (currentCharIndex - 1 + characters.length) % characters.length;
            updateScene();
            audio.play();
            isPlaying = true;
            playButton.textContent = '⏸';
        };

        document.getElementById('nextButton').onclick = () => {
            currentCharIndex = (currentCharIndex + 1) % characters.length;
            updateScene();
            audio.play();
            isPlaying = true;
            playButton.textContent = '⏸';
        };

        document.getElementById('backButton').onclick = () => {
            scene.classList.remove('active');
            menu.classList.remove('hidden');
            audio.pause();
            isPlaying = false;
            playButton.textContent = '▶';
        };

        // Логотип (возврат в меню)
        document.getElementById('logo').onclick = () => {
            scene.classList.remove('active');
            menu.classList.remove('hidden');
            audio.pause();
            isPlaying = false;
            playButton.textContent = '▶';
        };

        // Кнопка play/pause
        playButton.onclick = () => {
            if (isPlaying) {
                audio.pause();
                playButton.textContent = '▶';
            } else {
                audio.play();
                playButton.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        };

        // Обновление времени аудио
        audio.addEventListener('timeupdate', () => {
            updateTimeDisplay();
            if (audio.duration) {
                const progress = audio.currentTime / audio.duration;
                updateWaveform(progress);
            }
        });

        // Солнце (перетаскивание)
        let isSunDragging = false;
        let startX, startLeft;

        sun.addEventListener('mousedown', (e) => {
            isSunDragging = true;
            startX = e.clientX;
            startLeft = parseInt(sun.style.left) || sunBounds.minX;
            sun.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isSunDragging) return;
            
            let dx = e.clientX - startX;
            let newLeft = startLeft + dx;
            
            newLeft = Math.max(sunBounds.minX, Math.min(sunBounds.maxX, newLeft));
            sun.style.left = newLeft + 'px';
            
            if (audio.duration) {
                const progress = (newLeft - sunBounds.minX) / (sunBounds.maxX - sunBounds.minX);
                audio.currentTime = progress * audio.duration;
                updateWaveform(progress);
            }
        });

        window.addEventListener('mouseup', () => {
            isSunDragging = false;
            sun.style.cursor = 'grab';
        });

        // Свайп для мобильных
        let touchStartX = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        window.addEventListener('touchend', (e) => {
            if (!scene.classList.contains('active')) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;
            
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    currentCharIndex = (currentCharIndex - 1 + characters.length) % characters.length;
                } else {
                    currentCharIndex = (currentCharIndex + 1) % characters.length;
                }
                updateScene();
                audio.play();
                isPlaying = true;
                playButton.textContent = '⏸';
            }
        });

        // Инициализация
        renderMenu();
        sun.style.left = sunBounds.minX + 'px';
        sun.style.top = sunBounds.y + 'px';
        updateWaveform(0);

        // Обработка resize
        window.addEventListener('resize', () => {
            sunBounds.maxX = window.innerWidth - 130;
            sunBounds.y = window.innerHeight - 150;
        });
    </script>
</body>
</html>
